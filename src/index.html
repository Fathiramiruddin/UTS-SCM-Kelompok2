<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Biodata Mahasiswa - UTS SCM</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #667eea, #764ba2);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        body.dark {
            background: #1e1e2f;
        }

        .container {
            width: 100%;
            max-width: 900px;
        }

        h1 {
            text-align: center;
            color: white;
        }

        .subtitle {
            text-align: center;
            color: #ddd;
            margin-bottom: 20px;
        }

        .card {
            background: white;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
        }

        body.dark .card {
            background: #2c2c3e;
            color: white;
        }

        input, select {
            width: 100%;
            padding: 10px;
            margin-bottom: 10px;
        }

        body.dark input, body.dark select {
            background: #3a3a4f;
            color: white;
        }

        .btn-submit {
            padding: 10px;
            width: 100%;
            background: #3498db;
            color: white;
            border: none;
            cursor: pointer;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            background: #667eea;
            color: white;
            padding: 10px;
        }

        td {
            padding: 10px;
            text-align: center;
        }

        tbody tr:nth-child(even) {
            background: #f9f9f9;
        }

        tbody tr:hover {
            background: #e6ecff;
        }

        body.dark th {
            background: #444;
        }

        body.dark td {
            border-color: #555;
        }
    </style>
</head>

<body>
<div class="container">
    <h1>Sistem Biodata Mahasiswa</h1>
    <p class="subtitle">Tugas UTS Manajemen Konfigurasi Perangkat Lunak</p>

    <div class="card">
        <h3>Input Data</h3>
        <form id="biodataForm">
            <input type="text" id="nama" placeholder="Nama" required>
            <input type="text" id="nim" placeholder="NIM" required>
            <select id="jurusan">
                <option>TRPL</option>
                <option>TI</option>
                <option>SI</option>
            </select>
            <button type="submit" class="btn-submit">Simpan</button>
        </form>
    </div>

    <div class="card">
        <h3>Daftar Mahasiswa</h3>

        <p id="totalData">Total Data: 0</p>

        <button onclick="toggleDarkMode()">🌙 Dark Mode</button>
        <button onclick="exportCSV()">Export CSV</button>
        <button onclick="clearAllData()">Hapus Semua</button>

        <input type="text" id="searchInput" placeholder="Cari...">

        <!-- FILTER JURUSAN -->
        <select id="filterJurusan">
            <option value="">Semua Jurusan</option>
            <option value="TRPL">TRPL</option>
            <option value="TI">TI</option>
            <option value="SI">SI</option>
        </select>

        <table>
            <thead>
                <tr>
                    <th>No</th>
                    <th>Nama</th>
                    <th>NIM</th>
                    <th>Jurusan</th>
                    <th>Aksi</th>
                </tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>
</div>

<script>
let editIndex = -1;

function getData() {
    return JSON.parse(localStorage.getItem("mahasiswa")) || [];
}

function saveData(data) {
    data.sort((a, b) => a.nama.localeCompare(b.nama));
    localStorage.setItem("mahasiswa", JSON.stringify(data));
}

function renderTable() {
    const data = getData();
    const tbody = document.getElementById("tableBody");
    const filter = document.getElementById("filterJurusan").value;
    const search = document.getElementById("searchInput").value.toLowerCase();

    tbody.innerHTML = "";

    let filteredData = data.filter(mhs => {
        const cocokJurusan = !filter || mhs.jurusan === filter;
        const cocokSearch = mhs.nama.toLowerCase().includes(search) ||
                            mhs.nim.includes(search);

        return cocokJurusan && cocokSearch;
    });

    filteredData.forEach((mhs, i) => {
        tbody.innerHTML += `
        <tr>
            <td>${i+1}</td>
            <td>${mhs.nama}</td>
            <td>${mhs.nim}</td>
            <td>${mhs.jurusan}</td>
            <td>
                <button onclick="editData(${i})">Edit</button>
                <button onclick="deleteData(${i})">Hapus</button>
            </td>
        </tr>`;
    });

    document.getElementById("totalData").innerText =
        "Total Data: " + filteredData.length;
}

document.getElementById("biodataForm").addEventListener("submit", function(e){
    e.preventDefault();

    const nama = document.getElementById("nama").value.trim();
    const nim = document.getElementById("nim").value.trim();
    const jurusan = document.getElementById("jurusan").value;

    if (!/^\\d+$/.test(nim)) {
        alert("NIM harus angka!");
        return;
    }

    let data = getData();

    if (data.some((m,i)=>m.nim===nim && i!==editIndex)) {
        alert("NIM sudah ada!");
        return;
    }

    if (editIndex === -1) {
        data.push({nama,nim,jurusan});
    } else {
        data[editIndex] = {nama,nim,jurusan};
        editIndex = -1;
    }

    saveData(data);
    renderTable();
    this.reset();
});

function editData(i){
    const d = getData()[i];
    document.getElementById("nama").value = d.nama;
    document.getElementById("nim").value = d.nim;
    document.getElementById("jurusan").value = d.jurusan;
    editIndex = i;
}

function deleteData(i){
    if(confirm("Hapus data?")){
        let d = getData();
        d.splice(i,1);
        saveData(d);
        renderTable();
    }
}

function clearAllData(){
    if(confirm("Hapus semua?")){
        localStorage.removeItem("mahasiswa");
        renderTable();
    }
}

function exportCSV(){
    let data = getData();
    let csv = "Nama,NIM,Jurusan\\n";
    data.forEach(d=>{
        csv += `${d.nama},${d.nim},${d.jurusan}\\n`;
    });

    let blob = new Blob([csv]);
    let a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "data.csv";
    a.click();
}

function toggleDarkMode(){
    document.body.classList.toggle("dark");
}

document.getElementById("searchInput").addEventListener("keyup", renderTable);
document.getElementById("filterJurusan").addEventListener("change", renderTable);

window.onload = renderTable;
</script>

</body>
</html>
