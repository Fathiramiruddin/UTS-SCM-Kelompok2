<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Biodata Mahasiswa - UTS SCM</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Sistem Biodata Mahasiswa</h1>
        <p class="subtitle">Tugas UTS Manajemen Konfigurasi Perangkat Lunak</p>
        
        <div class="card">
            <h3>Input Data Mahasiswa</h3>
            <form id="biodataForm">
                <div class="form-group">
                    <label for="nama">Nama Lengkap:</label>
                    <input type="text" id="nama" required placeholder="Masukkan nama lengkap">
                </div>
                <div class="form-group">
                    <label for="nim">NIM:</label>
                    <input type="text" id="nim" required placeholder="Masukkan NIM">
                </div>
                <div class="form-group">
                    <label for="jurusan">Jurusan:</label>
                    <select id="jurusan">
                        <option value="Teknologi Rekayasa Perangkat Lunak">Teknologi Rekayasa Perangkat Lunak</option>
                        <option value="Teknik Informatika">Teknik Informatika</option>
                        <option value="Sistem Informasi">Sistem Informasi</option>
                    </select>
                </div>
                <button type="submit" class="btn-submit">Simpan Data</button>
                <button type="reset" style="background-color: #95a5a6; margin-top: 10px;" class="btn-submit">Reset Form</button>
            </form>
        </div>

        <div class="card">
            <h3>Daftar Mahasiswa Terdaftar</h3>

            <input type="text" id="searchInput" placeholder="Cari data mahasiswa..." 
            style="margin-bottom:10px; padding:8px; width:100%;">

            <table id="mahasiswaTable">
                <thead>
                    <tr>
                        <th>Nama</th>
                        <th>NIM</th>
                        <th>Jurusan</th>
                        <th>Aksi</th> </tr>
                </thead>
                <tbody>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        // ✅ Variable global untuk melacak mode (Edit atau Tambah)
        let editIndex = -1; 

        // ✅ Ambil data dari LocalStorage
        function getData() {
            return JSON.parse(localStorage.getItem("mahasiswa")) || [];
        }

        // ✅ Simpan ke LocalStorage
        function saveData(data) {
            localStorage.setItem("mahasiswa", JSON.stringify(data));
        }

        // ✅ Tampilkan ke tabel
        function renderTable() {
            const table = document.querySelector("#mahasiswaTable tbody");
            table.innerHTML = "";

            const mahasiswa = getData();

            mahasiswa.forEach((mhs, index) => {
                const row = table.insertRow();
                row.insertCell(0).innerText = mhs.nama;
                row.insertCell(1).innerText = mhs.nim;
                row.insertCell(2).innerText = mhs.jurusan;
                
                // Tambahan: Tombol Edit di kolom Aksi
                const aksiCell = row.insertCell(3);
                aksiCell.innerHTML = `<button onclick="editData(${index})" style="background-color: #f39c12; color: white; border: none; padding: 5px 10px; cursor: pointer; border-radius: 4px; font-size: 14px;">Edit</button>`;
            });
        }

        // ✅ Tambahan: Fungsi untuk memasukkan data ke Form saat tombol Edit diklik
        function editData(index) {
            const mahasiswa = getData();
            const mhs = mahasiswa[index];

            document.getElementById('nama').value = mhs.nama;
            document.getElementById('nim').value = mhs.nim;
            document.getElementById('jurusan').value = mhs.jurusan;

            editIndex = index;
            
            const submitBtn = document.querySelector('.btn-submit[type="submit"]');
            submitBtn.innerText = "Perbarui Data";
            submitBtn.style.backgroundColor = "#f39c12"; 
        }

        // ✅ Modifikasi: Tambah atau Perbarui Data
        document.getElementById('biodataForm').addEventListener('submit', function(e) {
            e.preventDefault();

            const nama = document.getElementById('nama').value;
            const nim = document.getElementById('nim').value;
            const jurusan = document.getElementById('jurusan').value;

            let mahasiswa = getData();

            if (editIndex === -1) {
                // Mode Tambah Data Baru
                mahasiswa.push({ nama, nim, jurusan });
            } else {
                // Mode Perbarui Data Lama
                mahasiswa[editIndex] = { nama, nim, jurusan };
                
                // Kembalikan ke mode awal setelah update
                editIndex = -1;
                const submitBtn = document.querySelector('.btn-submit[type="submit"]');
                submitBtn.innerText = "Simpan Data";
                submitBtn.style.backgroundColor = "#3498db"; 
            }

            saveData(mahasiswa);
            renderTable();

            this.reset();
        });

        // ✅ Tambahan: Kembalikan tombol jika di-reset manual
        document.getElementById('biodataForm').addEventListener('reset', function() {
            editIndex = -1;
            const submitBtn = document.querySelector('.btn-submit[type="submit"]');
            submitBtn.innerText = "Simpan Data";
            submitBtn.style.backgroundColor = "#3498db";
        });

        // ✅ Search Data
        document.getElementById("searchInput").addEventListener("keyup", function() {
            const keyword = this.value.toLowerCase();
            const rows = document.querySelectorAll("#mahasiswaTable tbody tr");

            rows.forEach(row => {
                const text = row.innerText.toLowerCase();
                row.style.display = text.includes(keyword) ? "" : "none";
            });
        });

        // ✅ Load saat pertama kali
        window.onload = renderTable;
    </script>
</body>
</html>
